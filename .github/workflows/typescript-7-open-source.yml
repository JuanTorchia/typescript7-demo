name: TypeScript 7 Fast Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify local fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show compiler versions
        run: |
          npx tsc6 --version
          npx tsgo --version

      - name: Run fast verification
        run: npm run verify

      - name: Run local benchmark
        run: npm run bench

      - name: Run migration scanner
        run: npm run scan:migration

      - name: Upload fast check artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: typescript-7-fast-check
          path: |
            benchmark-results.json
            migration-findings.json
