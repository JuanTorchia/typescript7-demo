name: TypeScript 7 Open Source Fixture

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  type-fest-fixture:
    name: TypeScript 7 public checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show compiler versions
        run: |
          npx tsc6 --version
          npx tsgo --version

      - name: Type-check local project with TypeScript 6
        run: npm run typecheck:ts6

      - name: Type-check local project with TypeScript 7 native preview
        run: npm run typecheck:ts7

      - name: Type-check Type-Fest fixture with TypeScript 6
        run: npm run typecheck:oss:ts6

      - name: Type-check Type-Fest fixture with TypeScript 7 native preview
        run: npm run typecheck:oss:ts7

      - name: Run benchmark
        run: npm run bench

      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: typescript-7-local-fixture-benchmark
          path: benchmark-results.json

      - name: Run public repository benchmark
        run: npm run bench:public

      - name: Upload public repository benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: typescript-7-public-repository-benchmark
          path: benchmark-public-repos.json
